<div class="usuarios-container">
    <div class="titulo-seccion">
        <h2>Gestion de Usuarios</h2>
        <p>Administra los usuarios registrados en el sistema</p>
        <button class="btn-crear" routerLink="crear">+ Crear Usuario</button>
    </div>

    <div class="cards-container">
        @for (usuario of usuarios; track usuario.id) {
        <div class="usuario-card">
            <div class="card-header">
                <div class="avatar">
                    👤
                </div>
                <div>
                    <h3>{{usuario.nombre}}</h3>
                    <p>{{usuario.correo}}</p>
                </div>
            </div>
            <div class="card-body">
                <div class="info-row">
                    <span class="label">Estado</span>
                    <span class="estado" [class.activo]="usuario.estado" [class.inactivo]="!usuario.estado">
                        {{usuario.estado ? 'Activo' : 'Inactivo'}}
                    </span>
                </div>
            </div>
            <div class="card-actions">
                <button class="btn-detalle" [routerLink]="[usuario.id]">
                    Ver detalle
                </button>
                <button class="btn-estado" (click)="changeEstadoUsuario(usuario.id)">
                    {{usuario.estado ? 'Desactivar' : 'Activar'}}
                </button>
                <button class="btn-eliminar" (click)="eliminarUsuario(usuario.id)">
                    Eliminar
                </button>
            </div>
        </div>
        }
    </div>
</div>
