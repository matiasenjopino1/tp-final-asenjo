
<div class="table-container">
    
    <div class="header-tabla">
        <h2>Listado de productos</h2>
    </div>

    <table>
        <thead>
            <tr>
                <th>Titulo</th>
                <th>Precio</th>
                <th>Precio con descuento</th>
                <th>Descripcion</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            @for (producto of productos; track producto.id){
            <tr>
                <td>{{producto.titulo}}</td>
                <td class="precio">${{producto.precio}}</td>
                <td> ${{producto.precio | descuentoPipe:producto.descuento}}   </td>
                <td>{{producto.descripcion}}</td>
                <td class="acciones">
                    <button class="btn-detalle" [routerLink]="['/productos',producto.id]">Ver Detalle</button>
                    <button class="btn-eliminar" (click)="borrarProducto(producto.id)">Eliminar</button>
                </td>
            </tr>
            }
        </tbody>
    </table>
</div>
